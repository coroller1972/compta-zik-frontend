index index.html;

location = /index.html {
    add_header Cache-Control "no-store";
    try_files $uri =404;
}

location /src/ {
    add_header Cache-Control "public, max-age=300";
    try_files $uri =404;
}

location / {
    add_header Cache-Control "no-store";
    try_files $uri $uri/ /index.html;
}
