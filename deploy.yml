kind: Deployment
apiVersion: apps/v1
metadata:
  name: compta-zik-frontend
  labels:
    app: compta-zik-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compta-zik-frontend
  template:
    metadata:
      labels:
        app: compta-zik-frontend
    spec:
      containers:
        - name: compta-zik-frontend
          image: compta-zik-frontend:1.0
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "100Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
kind: Service
apiVersion: v1
metadata:
  name: compta-zik-frontend-svc
  labels:
    app: compta-zik-frontend
spec:
  ports:
    - name: http-80
      port: 80
      protocol: TCP
      targetPort: 8080
  selector:
    app: compta-zik-frontend
---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: compta-zik-frontend
  labels:
    app: compta-zik-frontend
spec:
  to:
    kind: Service
    name: compta-zik-frontend-svc
  port:
    targetPort: http-80
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
