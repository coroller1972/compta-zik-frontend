schemaVersion: 2.2.0
metadata:
  name: compta-zik-frontend
  version: 1.2.1
  provider: compta-zik
  displayName: compta-zik-frontend
  description: Frontend vue.js pour le service compta-zik
  tags:
    - Vue
    - nginx
  projectType: Frontend
  language: Vue
  attributes:
    alpha.dockerimage-port: 8080
parent:
  id: nginx
  registryUrl: 'https://registry.devfile.io'
  version: 1.4.0
components:
  - name: image-build
    image:
      imageName: compta-zik-frontend:1.0
      dockerfile:
        uri: Dockerfile
        buildContext: .
  - name: kubernetes-deploy
    attributes:
      deployment/replicas: 1
      deployment/cpuRequest: 100m
      deployment/memoryRequest: 100Mi
      deployment/container-port: 8080
    kubernetes:
      uri: deploy.yml
      endpoints:
        - name: http-80
          targetPort: 8080
          path: /
          secure: true
commands:
  - id: build-image
    apply:
      component: image-build
  - id: deployk8s
    apply:
      component: kubernetes-deploy
  - id: deploy
    composite:
      commands:
        - build-image
        - deployk8s
      group:
        kind: deploy
        isDefault: true
